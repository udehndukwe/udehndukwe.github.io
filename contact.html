<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us | Reliable Repairs</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        margin: 0;
        padding: 20px;
        color: #1f2937;
        background: #f9fafb;
      }
      .container {
        max-width: 760px;
        margin: 0 auto;
        background: white;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        padding: 30px;
      }
      h1, h2 {
        color: #111827;
      }
      a {
        color: #2563eb;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      label {
        font-weight: bold;
      }
      input, textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        margin-top: 6px;
        box-sizing: border-box;
      }
      button {
        background-color: #2563eb;
        color: white;
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
      }
      button:hover {
        background-color: #1d4ed8;
      }
      .form-group {
        margin-bottom: 18px;
      }
      .back-link {
        display: inline-block;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Contact Us</h1>
      <h2>Get in Touch</h2>
      <p>We'd love to hear from you! Reach out with any questions about our IT services or endpoint management solutions.</p>
      <hr />
      <h2>Contact Information</h2>
      <p><strong>Phone:</strong> <a href="tel:216-352-9317">216-352-9317</a><br />
      <strong>Email:</strong> <a href="mailto:udehndukwe@gmail.com">udehndukwe@gmail.com</a></p>
      <hr />
      <h2>Send us a Message</h2>
      <form action="https://formspree.io/f/xyzpqwer" method="POST">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>
        <button type="submit">Send Message</button>
      </form>
      <p class="back-link"><a href="index.html">← Back to Home</a></p>
    </div>
  </body>
</html>
